# NVIDIA GTX 1660 SUPER (CUDA) — full pipeline with SadTalker animation
version: "3.8"

services:
  avatar:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
        INSTALL_TORCH: "true"
    container_name: avatar-server
    ports:
      - "3012:3012"
    environment:
      GPU_TYPE: cuda
      MACHINE_NAME: server

      # LLM — use Ollama on office or dellserver
      LLM_BACKEND: ollama
      OLLAMA_URL: http://192.168.10.110:11434
      OLLAMA_MODEL: llama3.2

      # TTS
      TTS_BACKEND: edge
      TTS_VOICE: en-US-AnaNeural

      # Animation — SadTalker (audio-driven)
      ANIM_BACKEND: sadtalker
      SADTALKER_DIR: /opt/SadTalker
      SADTALKER_CHECKPOINT_DIR: /opt/SadTalker/checkpoints

      PERSONA_NAME: Belle
      LOG_LEVEL: INFO
    volumes:
      - ./app/static:/app/static
      - sadtalker-repo:/opt/SadTalker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  sadtalker-repo:
