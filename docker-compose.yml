services:
  anamnesis-mongo:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: anamnesis-mongo
    hostname: anamnesis-mongo
    restart: unless-stopped
    ports:
      - "5438:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_configdb:/data/configdb
    networks:
      - anamnesis-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { var s = db.adminCommand({replSetGetStatus:1}); if(s.myState !== 1) quit(1); } catch(e) { quit(1); }"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  anamnesis-app:
    build: .
    container_name: anamnesis-app
    restart: unless-stopped
    ports:
      - "3010:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGO_URI: "mongodb://anamnesis-mongo:27017"
      MONGO_DB: "${MONGO_DB:-anamnesis}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
      EMBEDDING_CPU_PCT: "${EMBEDDING_CPU_PCT:-50}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      OLLAMA_URL: "${OLLAMA_URL:-}"
      OLLAMA_URL_1: "${OLLAMA_URL_1:-}"
      OLLAMA_LABEL_1: "${OLLAMA_LABEL_1:-}"
      OLLAMA_GPU_1: "${OLLAMA_GPU_1:-false}"
      OLLAMA_URL_2: "${OLLAMA_URL_2:-}"
      OLLAMA_LABEL_2: "${OLLAMA_LABEL_2:-}"
      OLLAMA_GPU_2: "${OLLAMA_GPU_2:-false}"
      OLLAMA_URL_3: "${OLLAMA_URL_3:-}"
      OLLAMA_LABEL_3: "${OLLAMA_LABEL_3:-}"
      OLLAMA_GPU_3: "${OLLAMA_GPU_3:-false}"
      OLLAMA_DEFAULT_MODEL: "${OLLAMA_DEFAULT_MODEL:-llama3.2}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
      CLAUDE_CLI_HOST: "${CLAUDE_CLI_HOST:-host.docker.internal}"
      CLAUDE_CLI_PATH: "${CLAUDE_CLI_PATH:-claude}"
      AUTHORIZED_MACHINE_ID: "${AUTHORIZED_MACHINE_ID:-}"
      NANOGPT_URLS: "${NANOGPT_URLS:-http://localhost:3011}"
      D2_ENDPOINT_URL: "${D2_ENDPOINT_URL:-}"
      D2_TIMEOUT_SECONDS: "${D2_TIMEOUT_SECONDS:-120}"
      # ── Together.ai (hosted, pay-per-token) ─────────────
      # TOGETHER_AI_KEY is the canonical name (matches together.ai dashboard).
      # TOGETHER_API_KEY kept for legacy/external compat — config.py reads either.
      TOGETHER_AI_KEY: "${TOGETHER_AI_KEY:-}"
      TOGETHER_AI_ID: "${TOGETHER_AI_ID:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      TOGETHER_BASE_URL: "${TOGETHER_BASE_URL:-https://api.together.xyz/v1}"
      # ── RunPod (on-demand A100/H100 pods, OpenAI-compatible vLLM) ─
      RUNPOD_API_KEY: "${RUNPOD_API_KEY:-}"
      RUNPOD_POD_ID: "${RUNPOD_POD_ID:-}"
      RUNPOD_ENDPOINT_URL: "${RUNPOD_ENDPOINT_URL:-}"
      RUNPOD_DEFAULT_MODEL: "${RUNPOD_DEFAULT_MODEL:-meta-llama/Meta-Llama-3.1-70B-Instruct}"
      # Opaque RunPod-side ID for pulling private ghcr.io image.
      # Provisioned once via saveRegistryAuth GraphQL; lives in AWS secret.
      RUNPOD_REGISTRY_AUTH_ID: "${RUNPOD_REGISTRY_AUTH_ID:-}"
      TRAINER_URLS: "${TRAINER_URLS:-}"
      TRAINER_URL_SERVER1: "${TRAINER_URL_SERVER1:-}"
      TRAINER_URL_SERVER2: "${TRAINER_URL_SERVER2:-}"
      TRAINER_LABEL_SERVER1: "${TRAINER_LABEL_SERVER1:-SERVER-1 · ROCm}"
      TRAINER_LABEL_SERVER2: "${TRAINER_LABEL_SERVER2:-SERVER-2 · CUDA}"
      # ── Avatar ─────────────────────────────────────────────
      # Primary: server (NVIDIA CUDA) — fast XTTS. No SadTalker checkpoints here.
      AVATAR_WORKER_URL_1: "${AVATAR_WORKER_URL_1:-http://192.168.10.15:3013}"
      AVATAR_WORKER_LABEL_1: "${AVATAR_WORKER_LABEL_1:-server · 1660 SUPER CUDA}"
      # Fallback: office (AMD ROCm) — has SadTalker, slower XTTS
      AVATAR_WORKER_URL_2: "${AVATAR_WORKER_URL_2:-http://192.168.10.110:3013}"
      AVATAR_WORKER_LABEL_2: "${AVATAR_WORKER_LABEL_2:-office · RX 6800 ROCm}"
      AVATAR_WORKER_URL_3: "${AVATAR_WORKER_URL_3:-}"
      AVATAR_WORKER_LABEL_3: "${AVATAR_WORKER_LABEL_3:-}"
      AVATAR_WORKER_URL_4: "${AVATAR_WORKER_URL_4:-}"
      AVATAR_WORKER_LABEL_4: "${AVATAR_WORKER_LABEL_4:-}"
      # Slot 5 reserved for the RunPod-hosted avatar worker (set by
      # deploy_runpod.sh with RUNPOD_PROFILE=avatar). Slots 1-4 are local
      # workers; 5-9 cloud. AVATAR_WORKER_URL_N iteration in app/config.py
      # stops at the first empty slot, so empty 4 is fine but slot 5 needs
      # 4 to be set when populated — config.py handles this.
      AVATAR_WORKER_URL_5: "${AVATAR_WORKER_URL_5:-}"
      AVATAR_WORKER_LABEL_5: "${AVATAR_WORKER_LABEL_5:-runpod · cloud GPU}"
      AVATAR_EDGE_VOICE: "${AVATAR_EDGE_VOICE:-en-US-AvaNeural}"
      AVATAR_PERSONA_NAME: "${AVATAR_PERSONA_NAME:-Belle}"
      AVATAR_ANIMATE_DEFAULT: "${AVATAR_ANIMATE_DEFAULT:-auto}"
      VOICES_DIR: "/app/voices"
    volumes:
      - /etc/machine-id:/etc/host-machine-id:ro
      - ./app:/app
      - model_cache:/root/.cache/torch/sentence_transformers
      # Phase 7.2b — restart-trigger tmpfs. Container writes "reboot" to
      # trigger, host-side anamnesis-restart-watcher.service polls + runs
      # ./start.sh. See deployment/README.md (NVR pattern).
      - /dev/shm/anamnesis-restart:/dev/shm/anamnesis-restart
      # ── Machine roots (read-only) ─────────────────────────────
      # Customize via .env: SOURCE_0 through SOURCE_5 (host paths)
      # and SOURCE_0_NAME through SOURCE_5_NAME (container mount names).
      # source-0: local $HOME (direct mount — this machine)
      - ${SOURCE_0:-${LOCAL_HOME:-/home/user}}:/sources/${SOURCE_0_NAME:-source-0}:ro
      # source-1..5: remote machines staged via sync_sources.sh
      - ${SOURCE_1:-${SOURCES_DIR:-./sources}/source-1}:/sources/${SOURCE_1_NAME:-source-1}:ro
      - ${SOURCE_2:-${SOURCES_DIR:-./sources}/source-2}:/sources/${SOURCE_2_NAME:-source-2}:ro
      - ${SOURCE_3:-${SOURCES_DIR:-./sources}/source-3}:/sources/${SOURCE_3_NAME:-source-3}:ro
      - ${SOURCE_4:-${SOURCES_DIR:-./sources}/source-4}:/sources/${SOURCE_4_NAME:-source-4}:ro
      - ${SOURCE_5:-${SOURCES_DIR:-./sources}/source-5}:/sources/${SOURCE_5_NAME:-source-5}:ro
      # ── Other source directories ──────────────────────────────
      - ${TEACHINGS_DIR:-./sources/teachings}:/sources/teachings:ro
      - ${DOCUMENTS_DIR:-./sources/documents}:/sources/documents:ro
      # ── SSH keys (read-only — enables SSH browsing to other machines) ──
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro
      # ── Avatar: cloned voice WAVs (persistent) ────────────────
      - anamnesis_voices:/app/voices
      # ── Avatar/persona source samples (images, audio — read-write
      #    so UI-uploaded sources persist on host alongside manually placed files)
      - ./samples:/app/samples
      # ── Shared MOBIUS.PROXY CA cert (ro) — served by /install-cert so
      #    users can install the "NVR Local CA" from any Anamnesis page.
      #    Per MSG-346: one cert, no device re-import on rotation.
      - ~/0_MOBIUS.PROXY/certs/ca.pem:/etc/ssl/mobius_ca.pem:ro
    depends_on:
      anamnesis-mongo:
        condition: service_healthy
    networks:
      - anamnesis-net

volumes:
  mongo_data:
  mongo_configdb:
  model_cache:
  anamnesis_voices:

networks:
  anamnesis-net:
    driver: bridge
