services:
  anamnesis-mongo:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: anamnesis-mongo
    hostname: anamnesis-mongo
    restart: unless-stopped
    ports:
      - "5438:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_configdb:/data/configdb
    networks:
      - anamnesis-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { var s = db.adminCommand({replSetGetStatus:1}); if(s.myState !== 1) quit(1); } catch(e) { quit(1); }"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  anamnesis-app:
    build: .
    container_name: anamnesis-app
    restart: unless-stopped
    ports:
      - "3010:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGO_URI: "mongodb://anamnesis-mongo:27017"
      MONGO_DB: "${MONGO_DB:-anamnesis}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
      EMBEDDING_CPU_PCT: "${EMBEDDING_CPU_PCT:-50}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_DEFAULT_MODEL: "${OLLAMA_DEFAULT_MODEL:-llama3.2}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
    volumes:
      - ./app:/app
      - model_cache:/root/.cache/torch/sentence_transformers
      # ── Machine roots (read-only) ─────────────────────────────
      # dellserver: local $HOME (direct mount)
      - /home/elfege:/sources/dellserver:ro
      # server, officewsl, hvtmc: staged via sync_sources.sh (hourly cron)
      - /home/elfege/0_ANAMNESIS_SOURCES/server:/sources/server:ro
      - /home/elfege/0_ANAMNESIS_SOURCES/officewsl:/sources/officewsl:ro
      - /home/elfege/0_ANAMNESIS_SOURCES/hvtmc:/sources/hvtmc:ro
      # ── Other source directories ──────────────────────────────
      - /home/elfege/0_TEACHINGS:/sources/teachings:ro
      - /mnt/sdb/onedrive_documents:/sources/documents:ro
      # ── SSH keys (read-only — enables SSH browsing to other machines) ──
      - /home/elfege/.ssh:/root/.ssh:ro
    depends_on:
      anamnesis-mongo:
        condition: service_healthy
    networks:
      - anamnesis-net

volumes:
  mongo_data:
  mongo_configdb:
  model_cache:

networks:
  anamnesis-net:
    driver: bridge
