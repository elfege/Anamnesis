<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ persona }} — Anamnesis Avatar</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" sizes="any">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --border: #2a2a3e;
      --text: #e0e0f0;
      --text-dim: #888899;
      --accent: #7c6ff5;
      --accent-glow: rgba(124, 111, 245, 0.3);
      --user-bg: #1a1a3a;
      --ai-bg: #0f1f1a;
      --danger: #d4556e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; overflow: hidden;
    }

    /* ── Avatar Panel ── */
    .avatar-panel {
      width: 400px; min-width: 400px;
      background: var(--surface);
      display: flex; flex-direction: column; align-items: center;
      border-right: 1px solid var(--border);
    }
    .avatar-container {
      width: 100%; flex: 1; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-container img, .avatar-container video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .avatar-name {
      padding: 12px; text-align: center; font-size: 14px;
      color: var(--text-dim); border-top: 1px solid var(--border); width: 100%;
    }
    .avatar-name .name-text { color: var(--accent); font-weight: 600; }
    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #444;
      margin-right: 6px; vertical-align: middle;
    }
    .status-dot.thinking { background: #f5a623; animation: pulse 1s infinite; }
    .status-dot.speaking { background: #4caf50; animation: pulse 0.5s infinite; }
    .status-dot.ready { background: #4caf50; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Chat Panel ── */
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    .chat-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .chat-header-left { display: flex; align-items: center; gap: 12px; }
    .chat-header h1 { font-size: 18px; font-weight: 600; }
    .backend-info { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

    .home-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
      text-decoration: none; display: inline-block;
    }
    .home-btn:hover { border-color: var(--accent); }

    .voice-bar { display: flex; align-items: center; gap: 8px; }
    .voice-bar label { font-size: 12px; color: var(--text-dim); }
    .voice-bar select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; min-width: 220px; cursor: pointer;
    }
    .voice-bar select:focus { outline: none; border-color: var(--accent); }
    .icon-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 6px 10px;
      cursor: pointer; font-size: 13px;
    }
    .icon-btn:hover { background: var(--surface); border-color: var(--accent); }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .message {
      max-width: 75%; padding: 12px 16px; border-radius: 12px;
      line-height: 1.5; font-size: 15px; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; background: var(--user-bg); border: 1px solid var(--border); }
    .message.assistant { align-self: flex-start; background: var(--ai-bg); border: 1px solid rgba(76, 175, 80, 0.15); }
    .message.assistant .timing {
      margin-top: 8px; font-size: 11px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .input-bar { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    .input-bar input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; color: var(--text);
      font-size: 15px; outline: none;
    }
    .input-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .input-bar button {
      background: var(--accent); border: none; border-radius: 8px;
      padding: 12px 24px; color: white; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .input-bar button:hover { opacity: 0.85; }
    .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
    audio { display: none; }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 520px; max-width: 92vw;
      max-height: 90vh; overflow: auto; padding: 24px;
    }
    .modal h2 { margin-bottom: 4px; }
    .modal p.hint { color: var(--text-dim); font-size: 12px; margin-bottom: 16px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 14px; cursor: pointer; color: var(--text-dim);
      border-bottom: 2px solid transparent; font-size: 13px; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-body { display: none; }
    .tab-body.active { display: block; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
    .field input[type="text"], .field input[type="file"], .field select, .field textarea {
      width: 100%; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font-size: 13px; font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .record-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .record-btn {
      padding: 10px 16px; background: var(--danger); border: none;
      border-radius: 6px; color: white; cursor: pointer; font-weight: 600;
    }
    .record-btn.stopped { background: var(--accent); }
    .record-status { font-size: 12px; color: var(--text-dim); align-self: center; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .modal-actions button { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-primary:disabled, .btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress { font-size: 12px; color: var(--text-dim); padding: 8px 0; font-family: 'JetBrains Mono', monospace; }
    .progress.error { color: var(--danger); }

    /* ── Sessions drawer (slide-out from left, overlays avatar panel) ── */
    .sessions-drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 300px; background: var(--surface);
      border-right: 1px solid var(--border);
      transform: translateX(-100%); transition: transform 0.2s ease-out;
      z-index: 50; display: flex; flex-direction: column;
    }
    .sessions-drawer.open { transform: translateX(0); box-shadow: 2px 0 12px rgba(0,0,0,0.5); }
    .sessions-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sessions-header h2 { font-size: 14px; color: var(--text); margin: 0; }
    .sessions-list { flex: 1; overflow-y: auto; }
    .session-item {
      padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .session-item:hover { background: rgba(255,255,255,0.03); }
    .session-item.active { background: rgba(110, 168, 254, 0.08); border-left: 2px solid var(--accent); padding-left: 14px; }
    .session-item .title { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .session-item .del {
      opacity: 0; transition: opacity 0.1s; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 14px; padding: 4px;
    }
    .session-item:hover .del { opacity: 1; }
    .new-chat-btn {
      margin: 12px 16px; padding: 10px; background: var(--accent); color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .new-chat-btn:hover { opacity: 0.9; }
    .sessions-toggle {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
      margin-right: 8px;
    }
    .sessions-toggle:hover { color: var(--text); border-color: var(--accent); }
    .sessions-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40;
    }
    .sessions-backdrop.open { opacity: 1; pointer-events: auto; }

    /* ── Settings popover (opened by gear icon) ── */
    .settings-popover {
      position: absolute; top: 56px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      display: none; z-index: 60;
    }
    .settings-popover.open { display: block; }
    .settings-row {
      display: grid; grid-template-columns: 90px 1fr; gap: 10px;
      align-items: center; margin-bottom: 10px;
    }
    .settings-row label { font-size: 12px; color: var(--text-dim); }
    .settings-row select { width: 100%; }
    .settings-footer { font-size: 11px; color: var(--text-dim); margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <!-- Sessions drawer (slide-out from left) -->
  <div class="sessions-backdrop" id="sessionsBackdrop"></div>
  <aside class="sessions-drawer" id="sessionsDrawer">
    <div class="sessions-header">
      <h2>Conversations</h2>
      <button class="icon-btn" id="sessionsCloseBtn" title="Close">✕</button>
    </div>
    <button class="new-chat-btn" id="newChatBtn">+ New conversation</button>
    <div class="sessions-list" id="sessionsList"><div class="progress" style="padding:12px 16px">Loading…</div></div>
  </aside>

  <div class="avatar-panel">
    <div class="avatar-container">
      <img id="avatarImage" src="/static/img/belle_reference.png" alt="Avatar">
      <video id="avatarVideo" autoplay style="display:none;"></video>
    </div>
    <div class="avatar-name">
      <span class="status-dot ready" id="statusDot"></span>
      <span class="name-text" id="personaName">{{ persona }}</span>
      <span id="backendLabel" style="margin-left: 8px; font-size: 11px; opacity: 0.5;"></span>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-left">
        <a href="/dashboard" class="home-btn" title="Back to Anamnesis">← Home</a>
        <button class="sessions-toggle" id="sessionsToggleBtn" title="Conversations">☰</button>
        <h1>Avatar</h1>
      </div>
      <div class="voice-bar">
        <label for="voiceSel" style="font-size:12px">Voice:</label>
        <select id="voiceSel"></select>
        <button class="icon-btn" id="previewBtn" title="Preview current voice">▶</button>
        <button class="icon-btn" id="newVoiceBtn" title="Add a voice">＋ New</button>
        <button class="icon-btn danger" id="deleteVoiceBtn" title="Delete selected voice" style="display:none">🗑</button>
        <label style="margin-left:12px">
          <input type="checkbox" id="animChk"> <span style="font-size:12px;color:var(--text-dim)">Animate</span>
        </label>
        <button class="icon-btn" id="settingsBtn" title="Backend, model, worker" style="margin-left:12px">⚙</button>
      </div>
      <div class="backend-info" id="backendInfo">connecting…</div>
    </div>

    <!-- Settings popover (backend / model / worker) -->
    <div class="settings-popover" id="settingsPopover">
      <div class="settings-row">
        <label>Backend</label>
        <select id="backendSel"></select>
      </div>
      <div class="settings-row">
        <label>Model</label>
        <select id="modelSel"></select>
      </div>
      <div class="settings-row">
        <label>Worker</label>
        <select id="workerSel"></select>
      </div>
      <div class="settings-row" style="align-items:center">
        <label for="noFallbackChk" title="If set, only the preferred worker is tried; no fallback chain">No fallback</label>
        <input type="checkbox" id="noFallbackChk" style="width:auto">
      </div>
      <div class="settings-footer" id="settingsFooter"></div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Type a message…" autocomplete="off">
      <button id="sendBtn" onclick="send()">Send</button>
      <button id="stopBtn" onclick="stopGeneration()" style="display:none; background:var(--danger); color:white;">Stop</button>
    </div>
  </div>

  <audio id="audioPlayer"></audio>

  <!-- Voice creation modal -->
  <div class="modal-backdrop" id="voiceModal">
    <div class="modal">
      <h2>Add a voice</h2>
      <p class="hint">Upload clean speech (6–15s), or drop a song and we'll extract the vocals via Demucs first.</p>
      <div class="tabs">
        <div class="tab active" data-tab="file">Audio file</div>
        <div class="tab" data-tab="song">Song → vocals</div>
        <div class="tab" data-tab="record">Record</div>
      </div>
      <div class="tab-body active" data-tab="file">
        <div class="field">
          <label>WAV / MP3 / FLAC</label>
          <input type="file" id="fileInput" accept="audio/*">
        </div>
      </div>
      <div class="tab-body" data-tab="song">
        <div class="field">
          <label>Full song (MP3 / WAV). We'll run Demucs and keep ~15s of vocals.</label>
          <input type="file" id="songInput" accept="audio/*">
        </div>
      </div>
      <div class="tab-body" data-tab="record">
        <div class="record-controls">
          <button class="record-btn stopped" id="recordBtn">● Start recording</button>
          <span class="record-status" id="recordStatus">Not recording</span>
        </div>
        <audio id="recordPreview" controls style="display:none; width:100%;"></audio>
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="voiceName" placeholder="e.g. Belle (ParoleSonore)">
      </div>
      <div class="field">
        <label>Language</label>
        <select id="voiceLang">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="nl">Dutch</option>
          <option value="pl">Polish</option>
          <option value="tr">Turkish</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="zh-cn">Chinese</option>
        </select>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="voiceNotes" placeholder="Where did this sample come from?"></textarea>
      </div>
      <div class="progress" id="uploadProgress"></div>
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn" disabled>Save voice</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDot = document.getElementById('statusDot');
    const avatarImage = document.getElementById('avatarImage');
    const avatarVideo = document.getElementById('avatarVideo');
    const audioPlayer = document.getElementById('audioPlayer');
    const backendInfo = document.getElementById('backendInfo');
    const voiceSel = document.getElementById('voiceSel');
    const previewBtn = document.getElementById('previewBtn');
    const newVoiceBtn = document.getElementById('newVoiceBtn');
    const deleteVoiceBtn = document.getElementById('deleteVoiceBtn');
    const animChk = document.getElementById('animChk');

    const LS_KEY = 'anamnesis.avatar.voice_id';
    const LS_SESSION = 'anamnesis.avatar.session_id';
    const LS_BACKEND = 'anamnesis.avatar.backend';
    const LS_MODEL = 'anamnesis.avatar.model';
    const LS_WORKER = 'anamnesis.avatar.worker';
    const LS_NOFB = 'anamnesis.avatar.no_fallback';

    // Session state
    let currentSessionId = null;

    function newSessionId() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    function loadSessionPref() { try { return localStorage.getItem(LS_SESSION); } catch { return null; } }
    function saveSessionPref(id) { try { localStorage.setItem(LS_SESSION, id); } catch {} }
    function clearSessionPref() { try { localStorage.removeItem(LS_SESSION); } catch {} }
    const LS_ANIM = 'anamnesis.avatar.animate';
    function saveVoicePref(id) { try { localStorage.setItem(LS_KEY, id); } catch {} }
    function loadVoicePref() { try { return localStorage.getItem(LS_KEY); } catch { return null; } }

    async function refreshVoices(selectId) {
      const r = await fetch('/api/avatar/voices').then(r => r.json());
      voiceSel.innerHTML = '';
      if (r.cloned?.length) {
        const grp = document.createElement('optgroup');
        grp.label = 'Cloned';
        for (const v of r.cloned) {
          const opt = document.createElement('option');
          opt.value = v.id; opt.textContent = `${v.name} (${v.lang})`;
          opt.dataset.cloned = '1'; opt.dataset.slug = v.slug;
          grp.appendChild(opt);
        }
        voiceSel.appendChild(grp);
      }
      if (r.presets?.length) {
        const grp = document.createElement('optgroup');
        grp.label = 'Edge TTS presets';
        for (const v of r.presets) {
          const opt = document.createElement('option');
          opt.value = v.id; opt.textContent = v.name;
          grp.appendChild(opt);
        }
        voiceSel.appendChild(grp);
      }
      const desired = selectId || loadVoicePref() || r.default_voice_id;
      if (desired && [...voiceSel.options].some(o => o.value === desired)) {
        voiceSel.value = desired;
      }
      updateDeleteVisibility();
    }
    function updateDeleteVisibility() {
      const opt = voiceSel.selectedOptions[0];
      deleteVoiceBtn.style.display = opt?.dataset.cloned ? 'inline-block' : 'none';
    }
    voiceSel.addEventListener('change', () => { saveVoicePref(voiceSel.value); updateDeleteVisibility(); });

    previewBtn.addEventListener('click', async () => {
      const id = voiceSel.value; previewBtn.disabled = true;
      try {
        const opt = voiceSel.selectedOptions[0];
        let resp;
        if (opt?.dataset.cloned) {
          resp = await fetch(`/api/avatar/voices/${opt.dataset.slug}/preview`, {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({})
          }).then(r => r.json());
        } else {
          resp = await fetch('/api/avatar/preview-edge', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ voice_id: id }),
          }).then(r => r.json());
        }
        if (resp.audio_url) { audioPlayer.src = resp.audio_url; audioPlayer.play().catch(() => {}); }
      } catch (e) { console.error(e); }
      finally { previewBtn.disabled = false; }
    });

    deleteVoiceBtn.addEventListener('click', async () => {
      const opt = voiceSel.selectedOptions[0];
      if (!opt?.dataset.cloned) return;
      if (!confirm(`Delete voice "${opt.textContent}"?`)) return;
      await fetch(`/api/avatar/voices/${opt.dataset.slug}`, { method: 'DELETE' });
      await refreshVoices();
    });

    const modal = document.getElementById('voiceModal');
    const tabs = modal.querySelectorAll('.tab');
    const tabBodies = modal.querySelectorAll('.tab-body');
    let activeTab = 'file';
    function setTab(tab) {
      activeTab = tab;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      tabBodies.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      updateSaveEnabled();
    }
    tabs.forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));

    function openModal() {
      modal.classList.add('open'); setTab('file');
      document.getElementById('voiceName').value = '';
      document.getElementById('voiceNotes').value = '';
      document.getElementById('fileInput').value = '';
      document.getElementById('songInput').value = '';
      document.getElementById('recordPreview').style.display = 'none';
      document.getElementById('uploadProgress').textContent = '';
      recordedBlob = null; updateSaveEnabled();
    }
    function closeModal() { modal.classList.remove('open'); }
    newVoiceBtn.addEventListener('click', openModal);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);

    document.getElementById('fileInput').addEventListener('change', updateSaveEnabled);
    document.getElementById('songInput').addEventListener('change', updateSaveEnabled);
    document.getElementById('voiceName').addEventListener('input', updateSaveEnabled);

    function updateSaveEnabled() {
      const name = document.getElementById('voiceName').value.trim();
      let hasFile = false;
      if (activeTab === 'file') hasFile = !!document.getElementById('fileInput').files[0];
      if (activeTab === 'song') hasFile = !!document.getElementById('songInput').files[0];
      if (activeTab === 'record') hasFile = !!recordedBlob;
      document.getElementById('saveBtn').disabled = !(name && hasFile);
    }

    let mediaRecorder = null, recordedChunks = [], recordedBlob = null;
    const recordBtn = document.getElementById('recordBtn');
    const recordStatus = document.getElementById('recordStatus');
    const recordPreview = document.getElementById('recordPreview');
    recordBtn.addEventListener('click', async () => {
      if (mediaRecorder?.state === 'recording') { mediaRecorder.stop(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => e.data.size && recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
          recordPreview.src = URL.createObjectURL(recordedBlob);
          recordPreview.style.display = 'block';
          recordBtn.textContent = '● Start recording';
          recordBtn.classList.add('stopped');
          recordStatus.textContent = `Recorded ${Math.round(recordedBlob.size / 1024)} KB`;
          stream.getTracks().forEach(t => t.stop());
          updateSaveEnabled();
        };
        mediaRecorder.start();
        recordBtn.textContent = '■ Stop';
        recordBtn.classList.remove('stopped');
        recordStatus.textContent = 'Recording…';
      } catch (e) { recordStatus.textContent = `Mic error: ${e.message}`; }
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const saveBtn = document.getElementById('saveBtn');
      const progress = document.getElementById('uploadProgress');
      saveBtn.disabled = true; progress.classList.remove('error');
      progress.textContent = activeTab === 'song'
        ? 'Uploading + isolating vocals (this takes a minute)…' : 'Uploading…';

      const fd = new FormData();
      fd.append('name', document.getElementById('voiceName').value.trim());
      fd.append('language', document.getElementById('voiceLang').value);
      fd.append('notes', document.getElementById('voiceNotes').value);
      fd.append('kind', activeTab);
      if (activeTab === 'file') fd.append('file', document.getElementById('fileInput').files[0]);
      if (activeTab === 'song') fd.append('file', document.getElementById('songInput').files[0]);
      if (activeTab === 'record') {
        const ext = (recordedBlob.type.split('/')[1] || 'webm').split(';')[0];
        fd.append('file', recordedBlob, `record.${ext}`);
      }
      try {
        const resp = await fetch('/api/avatar/voices', { method: 'POST', body: fd });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({detail: resp.statusText}));
          throw new Error(err.detail || resp.statusText);
        }
        const data = await resp.json();
        progress.textContent = 'Done.';
        await refreshVoices(data.voice.id);
        saveVoicePref(data.voice.id);
        closeModal();
      } catch (e) {
        progress.classList.add('error');
        progress.textContent = `Failed: ${e.message}`;
      } finally { saveBtn.disabled = false; }
    });

    // Animate checkbox with localStorage
    try { animChk.checked = localStorage.getItem(LS_ANIM) === '1'; } catch {}
    animChk.addEventListener('change', () => {
      try { localStorage.setItem(LS_ANIM, animChk.checked ? '1' : '0'); } catch {}
    });

    // WebSocket
    let ws = null, currentAssistantEl = null, reconnectTimer = null;
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/api/avatar/ws`);
      ws.onopen = () => {
        backendInfo.textContent = 'connected';
        setGenerating(false);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };
      ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
      ws.onclose = () => {
        backendInfo.textContent = 'disconnected — reconnecting…';
        sendBtn.disabled = true;
        stopBtn.style.display = 'none';
        reconnectTimer = setTimeout(connect, 3000);
      };
      ws.onerror = () => ws.close();
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'token':
          setStatus('thinking');
          if (!currentAssistantEl) currentAssistantEl = addMessage('', 'assistant');
          currentAssistantEl.querySelector('.text').textContent += msg.data;
          scrollToBottom();
          break;
        case 'audio':
          setStatus('speaking');
          audioPlayer.src = msg.url;
          audioPlayer.play().catch(() => {});
          audioPlayer.onended = () => setStatus('ready');
          break;
        case 'video':
          avatarImage.style.display = 'none';
          avatarVideo.style.display = 'block';
          avatarVideo.src = msg.url;
          avatarVideo.play().catch(() => {});
          avatarVideo.onended = () => {
            avatarVideo.style.display = 'none';
            avatarImage.style.display = 'block';
          };
          break;
        case 'done':
          if (currentAssistantEl && msg.timings) {
            const timingEl = document.createElement('div');
            timingEl.className = 'timing';
            const parts = [];
            if (msg.timings.llm_ms) parts.push(`LLM: ${msg.timings.llm_ms}ms`);
            if (msg.timings.tts_ms) parts.push(`TTS: ${msg.timings.tts_ms}ms`);
            if (msg.timings.anim_ms) parts.push(`Anim: ${msg.timings.anim_ms}ms`);
            if (msg.timings.total_ms) parts.push(`Total: ${msg.timings.total_ms}ms`);
            if (msg.timings.voice_id) parts.push(msg.timings.voice_id);
            if (msg.timings.llm_endpoint) parts.push(`llm@${msg.timings.llm_endpoint}`);
            timingEl.textContent = parts.join(' · ');
            currentAssistantEl.appendChild(timingEl);
          }
          currentAssistantEl = null;
          if (audioPlayer.paused) setStatus('ready');
          setGenerating(false);
          break;
        case 'stopped':
          if (currentAssistantEl) {
            const hint = document.createElement('div');
            hint.className = 'timing';
            hint.textContent = '(stopped)';
            currentAssistantEl.appendChild(hint);
          }
          currentAssistantEl = null;
          setStatus('ready');
          setGenerating(false);
          break;
        case 'error':
          setStatus('ready');
          if (currentAssistantEl) currentAssistantEl.querySelector('.text').textContent += `\n[Error: ${msg.message}]`;
          else addMessage(`Error: ${msg.message}`, 'assistant');
          currentAssistantEl = null;
          setGenerating(false);
          break;
      }
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      if (!currentSessionId) {
        currentSessionId = newSessionId();
        saveSessionPref(currentSessionId);
      }
      addMessage(text, 'user');
      ws.send(JSON.stringify({
        message: text,
        voice_id: voiceSel.value || null,
        animate: animChk.checked,
        session_id: currentSessionId,
        backend: backendSel.value || 'ollama',
        model: modelSel.value || null,
        preferred_worker: workerSel.value || null,
        no_fallback: noFallbackChk.checked
      }));
      inputEl.value = '';
      setGenerating(true);
      setStatus('thinking');
      scrollToBottom();
    }

    function stopGeneration() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'stop' }));
      // UI state flips back when server sends "stopped" or "done"
    }

    function setGenerating(on) {
      sendBtn.style.display = on ? 'none' : '';
      stopBtn.style.display = on ? '' : 'none';
      sendBtn.disabled = on;
    }

    // ── Backend / model / worker (live inside the settings popover) ──
    const backendSel = document.getElementById('backendSel');
    const modelSel = document.getElementById('modelSel');
    const workerSel = document.getElementById('workerSel');
    const noFallbackChk = document.getElementById('noFallbackChk');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPopover = document.getElementById('settingsPopover');
    const settingsFooter = document.getElementById('settingsFooter');

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPopover.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (settingsPopover.classList.contains('open') &&
          !settingsPopover.contains(e.target) && e.target !== settingsBtn) {
        settingsPopover.classList.remove('open');
      }
    });

    function updateSettingsSummary() {
      const b = backendSel.value || 'ollama';
      const m = modelSel.value || '(default)';
      const w = workerSel.options[workerSel.selectedIndex]?.textContent || 'auto';
      const fb = noFallbackChk.checked ? ' · no-fb' : '';
      settingsFooter.textContent = `${b} · ${m} · ${w}${fb}`;
    }

    let backendsData = null;

    async function refreshBackends() {
      try {
        const r = await fetch('/api/avatar/models');
        backendsData = await r.json();
      } catch (e) { console.error('models fetch failed', e); return; }

      const saved = localStorage.getItem(LS_BACKEND) || backendsData.default_backend || 'ollama';
      backendSel.innerHTML = '';
      const LABELS = {
        'ollama': 'ollama (local)',
        'claude': 'claude (API)',
        'anamnesis_gpt': 'anamnesis_gpt (1.5B demo — low quality)',
      };
      for (const [name, info] of Object.entries(backendsData.backends || {})) {
        const opt = document.createElement('option');
        opt.value = name;
        const base = LABELS[name] || name;
        opt.textContent = info.available ? base : `${base} (n/a)`;
        opt.disabled = !info.available;
        backendSel.appendChild(opt);
      }
      backendSel.value = (backendsData.backends[saved]?.available ? saved : backendsData.default_backend) || 'ollama';
      populateModels();
      updateSettingsSummary();
    }

    function populateModels() {
      const b = backendSel.value;
      const info = backendsData?.backends?.[b];
      modelSel.innerHTML = '';
      if (!info || !info.models || !info.models.length) {
        const opt = document.createElement('option');
        opt.value = ''; opt.textContent = '(default)';
        modelSel.appendChild(opt);
        return;
      }
      for (const m of info.models) {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        modelSel.appendChild(opt);
      }
      const savedModel = localStorage.getItem(LS_MODEL);
      if (savedModel && info.models.includes(savedModel)) {
        modelSel.value = savedModel;
      } else if (b === 'ollama' && info.models.includes(backendsData.default_model)) {
        modelSel.value = backendsData.default_model;
      }
    }

    backendSel.addEventListener('change', () => {
      localStorage.setItem(LS_BACKEND, backendSel.value);
      populateModels();
      updateSettingsSummary();
    });
    modelSel.addEventListener('change', () => {
      localStorage.setItem(LS_MODEL, modelSel.value);
      updateSettingsSummary();
    });

    async function refreshWorkers() {
      try {
        const r = await fetch('/api/avatar/workers');
        const data = await r.json();
        workerSel.innerHTML = '';
        const autoOpt = document.createElement('option');
        autoOpt.value = ''; autoOpt.textContent = 'auto (fallback chain)';
        workerSel.appendChild(autoOpt);
        for (const w of (data.workers || [])) {
          const opt = document.createElement('option');
          opt.value = w.worker_id || w.label;
          const dot = w.reachable ? '●' : '○';
          const caps = (w.capabilities || []).length ? ` [${w.capabilities.join(',')}]` : '';
          opt.textContent = `${dot} ${w.label}${caps}`;
          opt.disabled = !w.reachable;
          workerSel.appendChild(opt);
        }
        const saved = localStorage.getItem(LS_WORKER);
        if (saved && [...workerSel.options].some(o => o.value === saved && !o.disabled)) {
          workerSel.value = saved;
        }
        updateSettingsSummary();
      } catch (e) { console.error('workers fetch failed', e); }
    }

    workerSel.addEventListener('change', () => {
      localStorage.setItem(LS_WORKER, workerSel.value);
      updateSettingsSummary();
    });

    // no-fallback toggle
    try { noFallbackChk.checked = localStorage.getItem(LS_NOFB) === '1'; } catch {}
    noFallbackChk.addEventListener('change', () => {
      try { localStorage.setItem(LS_NOFB, noFallbackChk.checked ? '1' : '0'); } catch {}
      updateSettingsSummary();
    });

    // ── Sessions drawer ────────────────────────────────────────────
    const drawer = document.getElementById('sessionsDrawer');
    const backdrop = document.getElementById('sessionsBackdrop');
    const sessionsList = document.getElementById('sessionsList');
    const sessionsToggle = document.getElementById('sessionsToggleBtn');
    const sessionsClose = document.getElementById('sessionsCloseBtn');
    const newChatBtn = document.getElementById('newChatBtn');

    function openSessions() {
      drawer.classList.add('open');
      backdrop.classList.add('open');
      loadSessionsList();
    }
    function closeSessions() {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
    }
    sessionsToggle.addEventListener('click', openSessions);
    sessionsClose.addEventListener('click', closeSessions);
    backdrop.addEventListener('click', closeSessions);

    async function loadSessionsList() {
      try {
        const r = await fetch('/api/avatar/sessions');
        const data = await r.json();
        if (!data.sessions || !data.sessions.length) {
          sessionsList.innerHTML = '<div class="progress" style="padding:12px 16px">No conversations yet.</div>';
          return;
        }
        sessionsList.innerHTML = '';
        for (const s of data.sessions) {
          const item = document.createElement('div');
          item.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
          item.innerHTML = `
            <div style="flex:1; overflow:hidden">
              <div class="title"></div>
              <div class="meta"></div>
            </div>
            <button class="del" title="Delete">🗑</button>`;
          item.querySelector('.title').textContent = s.title || '(untitled)';
          const when = s.updated_at ? new Date(s.updated_at).toLocaleString() : '';
          item.querySelector('.meta').textContent = `${s.message_count || 0} msgs · ${when}`;
          item.addEventListener('click', (e) => {
            if (e.target.classList.contains('del')) return;
            loadSession(s.session_id);
          });
          item.querySelector('.del').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete "${s.title || s.session_id}"?`)) return;
            await fetch(`/api/avatar/sessions/${s.session_id}`, { method: 'DELETE' });
            if (s.session_id === currentSessionId) startNewSession();
            loadSessionsList();
          });
          sessionsList.appendChild(item);
        }
      } catch (e) {
        sessionsList.innerHTML = `<div class="progress error" style="padding:12px 16px">Error: ${e.message}</div>`;
      }
    }

    async function loadSession(session_id) {
      try {
        const r = await fetch(`/api/avatar/sessions/${session_id}`);
        if (!r.ok) throw new Error(await r.text());
        const doc = await r.json();
        currentSessionId = session_id;
        saveSessionPref(session_id);
        messagesEl.innerHTML = '';
        for (const m of (doc.messages || [])) {
          addMessage(m.content, m.role === 'user' ? 'user' : 'assistant');
        }
        closeSessions();
      } catch (e) {
        alert(`Could not load session: ${e.message}`);
      }
    }

    function startNewSession() {
      currentSessionId = newSessionId();
      saveSessionPref(currentSessionId);
      messagesEl.innerHTML = '';
      closeSessions();
    }
    newChatBtn.addEventListener('click', startNewSession);
    function addMessage(text, role) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      const textSpan = document.createElement('span');
      textSpan.className = 'text';
      textSpan.textContent = text;
      el.appendChild(textSpan);
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }
    function setStatus(state) { statusDot.className = `status-dot ${state}`; }
    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    fetch('/api/avatar/info').then(r => r.json()).then(data => {
      document.getElementById('personaName').textContent = data.persona || 'Belle';
      const workers = data.worker_endpoints?.length ? data.worker_endpoints.join(',') : 'no-worker';
      backendInfo.textContent = `${data.llm} · workers: ${workers}`;
      document.getElementById('backendLabel').textContent = `(${data.animate_enabled ? 'animated' : 'voice only'})`;
      if (!data.worker_endpoints?.length) {
        // No GPU worker — disable cloned-voice and animate features
        animChk.disabled = true;
      }
    }).catch(() => {});

    refreshVoices();
    refreshBackends();
    refreshWorkers();
    connect();

    // Restore last session if one was in progress
    (async () => {
      const saved = loadSessionPref();
      if (!saved) return;
      try {
        const r = await fetch(`/api/avatar/sessions/${saved}`);
        if (r.ok) {
          const doc = await r.json();
          if (doc.messages && doc.messages.length) {
            currentSessionId = saved;
            for (const m of doc.messages) {
              addMessage(m.content, m.role === 'user' ? 'user' : 'assistant');
            }
          }
        } else {
          // Session gone; start fresh
          clearSessionPref();
        }
      } catch {}
    })();
  </script>
</body>
</html>
