services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: anamnesis-trainer:server-2
    container_name: anamnesis-trainer-server-2
    ports:
      - "3011:3011"
    volumes:
      - ./app:/app
      - /home/elfege/0_LLM_finetune:/train
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      GPU_TYPE: cuda
      MACHINE_NAME: SERVER-2
      TRAIN_DIR: /train
      VENV_PYTHON: /train/venv/bin/python
      TRAIN_SCRIPT: /train/qlora_train.py
    restart: unless-stopped
