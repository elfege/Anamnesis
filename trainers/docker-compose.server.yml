services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    image: anamnesis-trainer:server
    container_name: anamnesis-trainer-server
    ports:
      - "3011:3011"
    volumes:
      - ./app:/app
      - ${TRAIN_HOST_DIR:-./train_data}:/train
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      GPU_TYPE: cuda
      MACHINE_NAME: server
      TRAIN_DIR: /train
      VENV_PYTHON: /usr/local/bin/python
      TRAIN_SCRIPT: /train/qlora_train.py
    restart: unless-stopped
